<!DOCTYPE html>
<html>
<head>
    <title>Q3 Seatwork 2</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            padding: 40px;
        }

        h1{
            color: #333;
        }

        input{
            padding: 10px;
            width: 200px;
        }

        button{
            padding: 10px 15px;
            margin-left: 5px;
            cursor: pointer;
        }

        #result{
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>Product Locator</h1>

<p>Type a product name to find its location in the store.</p>

<input type="text" id="product" placeholder="Enter product name">

<button onclick="findProduct()">Find Product</button>

<p id="result"></p>

<p>Learn more about HTML at 
<a href="https://www.w3schools.com">W3Schools</a>
</p>

<script>


function findProduct(){

    let product = document.getElementById("product").value.toLowerCase();

    if(product == "milk"){
        document.getElementById("result").innerHTML = "Milk is located in Aisle 1.";
    }
    else if(product == "bread"){
        document.getElementById("result").innerHTML = "Bread is located in Aisle 2.";
    }
    else if(product == "eggs"){
        document.getElementById("result").innerHTML = "Eggs are located in Aisle 3.";
    }
    else if(product == "rice"){
        document.getElementById("result").innerHTML = "Rice is located in Aisle 4.";
    }
    else{
        document.getElementById("result").innerHTML = "Product not found in the store.";
    }

}
</script>

</body>
</html>
